version: "3.8"

services:
  # ─────────────────────────────────────────────
  # FastAPI - Backend Principal
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solara-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - solara-network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Redis - Broker e Backend do Celery
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: solara-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solara-network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Celery Worker - Processamento de Tarefas
  # ─────────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solara-celery-worker
    command: celery -A app.core.celery_app:celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - solara-network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Celery Beat - Agendador de Tarefas
  # ─────────────────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solara-celery-beat
    command: celery -A app.core.celery_app:celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - solara-network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Flower - Dashboard de Monitoramento (opcional)
  # ─────────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solara-flower
    command: celery -A app.core.celery_app:celery_app flower --port=5555 --basic_auth=admin:solara2026
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - solara-network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local

networks:
  solara-network:
    driver: bridge
