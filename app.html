<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assistente Solara – Sistema</title>
    <link rel="icon" type="image/png" href="/sol_com_risco_em_baixo-removebg-preview.png">
    
    <!-- Configuração Visual do Sistema (Cópia da original que funcionava) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              montserrat: ['Montserrat', 'sans-serif'],
              inter: ['Inter', 'sans-serif'],
            },
            colors: {
              solara: {
                primary: '#0a3d62',
                accent1: '#e55039',
                accent2: '#78e08f',
                border: '#82ccdd',
                bg: '#ced6e0',
                text1: '#57606f',
                text2: '#f1f2f6',
              }
            },
            borderRadius: {
              'solara': '7px',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Montserrat', sans-serif;
        background-color: #F8FAFC;
        margin: 0;
        overflow: hidden;
      }
      .premium-gradient {
        background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%);
      }
      .solara-card {
        background: white;
        border: 1px solid rgba(0,0,0,0.05);
        border-radius: 24px;
        box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
